<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add Product</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #4e73df, #1cc88a);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 30px;
    width: 350px;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #4e73df;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #2e59d9;
}

.error {
    color: red;
    font-size: 13px;
}
</style>

<script>
function validateForm() {

    let pcode = document.forms["productForm"]["pcode"].value;
    let pname = document.forms["productForm"]["pname"].value;
    let price = document.forms["productForm"]["pprice"].value;
    let qty = document.forms["productForm"]["pqty"].value;

    if(pcode === "" || pname === "" || price === "" || qty === ""){
        alert("All fields are required!");
        return false;
    }

    if(isNaN(price)){
        alert("Price must be a number!");
        return false;
    }

    if(isNaN(qty)){
        alert("Quantity must be a number!");
        return false;
    }

    if(price <= 0){
        alert("Price must be greater than 0");
        return false;
    }

    if(qty <= 0){
        alert("Quantity must be greater than 0");
        return false;
    }

    return true;
}
</script>

</head>

<body>

<div class="container">
    <h2>Add Product</h2>

    <form name="productForm" action="aps" method="post" onsubmit="return validateForm()">

        <input type="text" name="pcode" placeholder="Product Code">
        <input type="text" name="pname" placeholder="Product Name">
        <input type="text" name="pcomp" placeholder="Company Name">
        <input type="text" name="pprice" placeholder="Price">
        <input type="text" name="pqty" placeholder="Quantity">

        <button type="submit">Add Product</button>

    </form>
</div>

</body>
</html>
